components:
  schemas:
    NamespaceConfig:
      type: object
      description: NamespaceConfig model
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
          examples:
            - "1"
          readOnly: true
        displayName:
          type: string
          description: Display name of the namespace
          examples:
            - My namespace
        shortCode:
          type: string
          description: Short code for the namespace
          examples:
            - MY
        created:
          type: string
          format: date-time
          description: Created timestamp
          readOnly: true
        modified:
          type: string
          format: date-time
          description: Modified timestamp
          readOnly: true
    Problem:
      type: object
      properties:
        title:
          type: string
        detail:
          type: string
        instance:
          type: string
          format: uri
        type:
          type: string
          format: uri
        status:
          type: integer
          format: int32
    ConstraintViolationProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        status:
          type: integer
          format: int32
        violations:
          type: array
          items:
            $ref: "#/components/schemas/Violation"
        title:
          type: string
        causeAsProblem:
          $ref: "#/components/schemas/ThrowableProblem"
        detail:
          type: string
        instance:
          type: string
          format: uri
    ThrowableProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        causeAsProblem: { }
    Violation:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
    Lookup:
      type: object
      description: "Lookup model - metadata entry (category, status, type, role, contact\
        \ reason)"
      properties:
        name:
          type: string
          description: Name (machine-friendly key) of the lookup
          examples:
            - NEW
        displayName:
          type: string
          description: Display name
          examples:
            - New case
        created:
          type: string
          format: date-time
          description: Created timestamp
          readOnly: true
        modified:
          type: string
          format: date-time
          description: Modified timestamp
          readOnly: true
    ContactChannel:
      type: object
      description: ContactChannel model
      properties:
        key:
          type: string
          description: The key of the contact channel
          examples:
            - Email
        value:
          type: string
          description: The value of the contact channel
          examples:
            - joe.doe@example.com
    Errand:
      type: object
      description: Errand model
      properties:
        id:
          type: string
          description: Unique identifier of the errand
          examples:
            - cb20c51f-fcf3-42c0-b613-de563634a8ec
          readOnly: true
        municipalityId:
          type: string
          description: Municipality id
          examples:
            - "2281"
          readOnly: true
        namespace:
          type: string
          description: Namespace
          examples:
            - MY_NAMESPACE
          readOnly: true
        title:
          type: string
          description: Title for the errand
          examples:
            - Title of the errand
        category:
          type: string
          description: Category for the errand
          examples:
            - CATEGORY-1
        type:
          type: string
          description: Type for the errand
          examples:
            - TYPE-1
        status:
          type: string
          description: Status of the errand
          examples:
            - NEW
