  "/{municipalityId}/{namespace}/errands/{errandId}/process-messages":
    post:
      tags:
      - Process messages
      summary: Send a BPMN message to the running process for an errand
      description: Correlates a BPMN message (e.g. a handläggare's APPROVE/REJECT
        decision, an external event) to the process instance whose business key equals
        this errand id. The matching receive task or message catch event resumes with
        the supplied process variables.
      operationId: sendProcessMessage
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
        example: 2281
      - name: namespace
        in: path
        required: true
        schema:
          type: string
          pattern: "[\\w|\\-]+"
        example: MY_NAMESPACE
      - name: errandId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ProcessMessageRequest"
        required: true
      responses:
        '204':
          description: Message correlated
        '404':
          description: No process instance is waiting for this message on this errand
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
        '400':
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - "$ref": "#/components/schemas/Problem"
                - "$ref": "#/components/schemas/ConstraintViolationProblem"
        '500':
