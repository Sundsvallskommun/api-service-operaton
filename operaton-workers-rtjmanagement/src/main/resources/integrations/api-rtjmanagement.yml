---
openapi: 3.1.0
info:
  title: rtj-management
  contact: {}
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  version: '1.0'
servers:
- url: http://localhost:8091
  description: Generated server url
tags:
- name: Errand decisions
  description: Decision audit trail on an errand. Stores both system-generated decisions
    (e.g. DMN-evaluated recommendations from a BPMN process) and human decisions (e.g.
    handläggare APPROVE/REJECT), distinguished by `decisionType`.
- name: Notes
  description: Notes attached to an errand
- name: Notifications
  description: User-facing notifications raised against an errand. Recipients (`ownerId`)
    acknowledge them when seen; expired ones are purged by a daily background job.
- name: Errand stakeholders
  description: Errand stakeholder operations
- name: Status History
  description: Status transition log for an errand
- name: Metadata
  description: Metadata (lookup) operations
- name: Namespace config
  description: Namespace configuration operations
- name: Errands
  description: Errand operations
- name: Process messages
  description: Send BPMN message correlation events to the process instance currently
    running for an errand
- name: Errand attachments
  description: Errand attachment operations
paths:
  "/{municipalityId}/{namespace}/errands/{errandId}/notifications/acknowledged":
    put:
      tags:
      - Notifications
      summary: Acknowledge all notifications on an errand
      description: Sets `acknowledged=true` on every unacknowledged notification belonging
        to the errand.
      operationId: acknowledgeAll
      parameters:
      - name: municipalityId
        in: path
        required: true
        schema:
          type: string
        example: 2281
      - name: namespace
        in: path
        required: true
        schema:
          type: string
          pattern: "[\\w|\\-]+"
        example: MY_NAMESPACE
      - name: errandId
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Successful operation
        '404':
          description: Errand not found
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
        '400':
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - "$ref": "#/components/schemas/Problem"
                - "$ref": "#/components/schemas/ConstraintViolationProblem"
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
