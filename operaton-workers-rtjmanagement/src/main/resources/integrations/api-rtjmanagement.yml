        in: path
        description: Municipality id
        required: true
        schema:
          type: string
        example: 2281
      - name: namespace
        in: path
        description: Namespace
        required: true
        schema:
          type: string
          pattern: "[\\w|\\-]+"
        example: MY_NAMESPACE
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Errand"
        required: true
      responses:
        '201':
