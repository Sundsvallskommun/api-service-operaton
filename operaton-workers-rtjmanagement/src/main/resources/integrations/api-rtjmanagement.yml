  "/{municipalityId}/{namespace}/errands":
    get:
      tags:
      - Errands
      summary: Find errands
      description: Query for errands with optional spring-filter expression
      operationId: findErrands
      parameters:
      - name: municipalityId
        in: path
        description: Municipality id
        required: true
        schema:
          type: string
        example: 2281
      - name: namespace
        in: path
        description: Namespace
        required: true
        schema:
          type: string
          pattern: "[\\w|\\-]+"
        example: MY_NAMESPACE
      - name: filter
        in: query
        description: 'Syntax description: [spring-filter](https://github.com/turkraft/spring-filter/blob/85730f950a5f8623159cc0eb4d737555f9382bb7/README.md#syntax)'
        required: false
        schema:
          type: string
        example: status:'NEW' and created>'2024-01-01T00:00:00.000+01:00'
      - name: page
        in: query
        description: Zero-based page index (0..N)
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
      - name: size
        in: query
        description: The size of the page to be returned
        required: false
        schema:
          type: integer
          default: 10
          minimum: 1
      - name: sort
        in: query
        description: 'Sorting criteria in the format: property,(asc|desc). Default
          sort order is ascending. Multiple sort criteria are supported.'
        required: false
        schema:
          type: array
          default:
          - touched,DESC
          items:
            type: string
      responses:
        '200':
          description: Successful Operation
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/FindErrandsResponse"
        '400':
          description: Bad request
          content:
            application/problem+json:
              schema:
                oneOf:
                - "$ref": "#/components/schemas/Problem"
                - "$ref": "#/components/schemas/ConstraintViolationProblem"
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
    post:
      tags:
      - Errands
      summary: Create errand
      description: Creates a new errand
      operationId: createErrand
      parameters:
