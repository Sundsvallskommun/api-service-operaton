[_]
schema-version = "0.2"

# Paketo buildpack overrides: the deployable fat jar lives in the operaton-app
# submodule, not at the reactor root (which is pom-packaging).
[[build.env]]
name = "BP_MAVEN_BUILT_MODULE"
value = "operaton-app"

[[build.env]]
name = "BP_MAVEN_BUILT_ARTIFACT"
value = "operaton-app/target/operaton-app-*.jar"
